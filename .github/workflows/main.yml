name: Run Python Sum Script

on: [push] # Triggers every time you push code

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Debug - List all files
        # This shows exactly what folders and files exist in the runner
        run: ls -R

      - name: Run Script
        working-directory: src/
        run: python sum_script.py 1000 10
